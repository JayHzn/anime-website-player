<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Shinani</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 260px;
      background: #07070f;
      color: #e8e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 14px 11px;
      border-bottom: 1px solid rgba(168,85,247,0.12);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px rgba(168,85,247,0.4);
      flex-shrink: 0;
    }

    .logo svg { width: 13px; height: 13px; fill: white; }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1;
    }

    .header-text h1 .shin { color: #ffffff; }
    .header-text h1 .ani  { color: #a855f7; }

    .header-text p {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    .list-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.25);
      padding: 9px 14px 5px;
    }

    ul.sources {
      list-style: none;
      padding: 0 6px 6px;
    }

    ul.sources li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 9px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      border: 1px solid transparent;
    }

    ul.sources li:hover {
      background: rgba(168,85,247,0.07);
    }

    ul.sources li.active {
      background: rgba(168,85,247,0.12);
      border-color: rgba(168,85,247,0.25);
    }

    .src-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .src-icon.anime-sama  { background: rgba(99,102,241,0.25); color: #a5b4fc; }
    .src-icon.french-anime{ background: rgba(244,114,182,0.25); color: #f9a8d4; }
    .src-icon.vostfree    { background: rgba(251,146,60,0.25);  color: #fdba74; }
    .src-icon.jetanimes   { background: rgba(52,211,153,0.25);  color: #6ee7b7; }

    .src-info { flex: 1; min-width: 0; }

    .src-name {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      line-height: 1.2;
    }

    li.active .src-name { color: #c084fc; }

    .src-url {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
    }

    .check {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.12s;
    }

    li.active .check { opacity: 1; }

    .check svg { width: 15px; height: 15px; }

    .footer {
      padding: 7px 14px 10px;
      border-top: 1px solid rgba(168,85,247,0.08);
    }

    .footer p {
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
    </div>
    <div class="header-text">
      <h1><span class="shin">Shin</span><span class="ani">ani</span></h1>
      <p>Choisissez une source</p>
    </div>
  </div>

  <div class="list-label">Sources disponibles</div>

  <ul class="sources" id="sourcesList">
    <li data-source="anime-sama">
      <div class="src-icon anime-sama">AS</div>
      <div class="src-info">
        <div class="src-name">Anime-Sama</div>
        <div class="src-url">anime-sama.to</div>
      </div>
      <div class="check"><svg viewBox="0 0 20 20" fill="none"><path d="M5 10l4 4 6-7" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </li>

    <li data-source="vostfree">
      <div class="src-icon vostfree">VF</div>
      <div class="src-info">
        <div class="src-name">Vostfree</div>
        <div class="src-url">vostfree.ws</div>
      </div>
      <div class="check"><svg viewBox="0 0 20 20" fill="none"><path d="M5 10l4 4 6-7" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </li>

    <li data-source="jetanimes">
      <div class="src-icon jetanimes">JA</div>
      <div class="src-info">
        <div class="src-name">JetAnimes</div>
        <div class="src-url">jetanimes.com</div>
      </div>
      <div class="check"><svg viewBox="0 0 20 20" fill="none"><path d="M5 10l4 4 6-7" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </li>
  </ul>

  <div class="footer">
    <p>La page se rechargera automatiquement</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
