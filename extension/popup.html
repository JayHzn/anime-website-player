<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Shinani</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #07070f;
      color: #e8e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(168,85,247,0.12);
    }

    .logo {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(168,85,247,0.45);
      flex-shrink: 0;
    }

    .logo svg { width: 14px; height: 14px; fill: white; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1;
    }

    .header-text h1 .shin { color: #ffffff; }
    .header-text h1 .ani  { color: #a855f7; }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 3px;
    }

    .body {
      padding: 14px 16px 16px;
    }

    label.field-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 7px;
    }

    .select-wrap {
      position: relative;
    }

    select#sourceSelect {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background: rgba(168,85,247,0.06);
      color: #e8e8f0;
      border: 1px solid rgba(168,85,247,0.25);
      border-radius: 9px;
      padding: 10px 36px 10px 12px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.12s, background 0.12s;
    }

    select#sourceSelect:hover {
      background: rgba(168,85,247,0.10);
      border-color: rgba(168,85,247,0.4);
    }

    select#sourceSelect:focus {
      border-color: #a855f7;
      box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
    }

    select#sourceSelect option {
      background: #13132a;
      color: #e8e8f0;
      padding: 8px;
    }

    .select-wrap::after {
      content: '';
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 7px;
      height: 7px;
      border-right: 2px solid #a855f7;
      border-bottom: 2px solid #a855f7;
      pointer-events: none;
      margin-top: -3px;
    }

    .footer {
      padding: 9px 16px 12px;
      border-top: 1px solid rgba(168,85,247,0.08);
    }

    .footer p {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
    </div>
    <div class="header-text">
      <h1><span class="shin">Shin</span><span class="ani">ani</span></h1>
      <p>Choisissez une source</p>
    </div>
  </div>

  <div class="body">
    <label class="field-label" for="sourceSelect">Source active</label>
    <div class="select-wrap">
      <select id="sourceSelect">
        <option value="">— Aucune source —</option>
        <option value="anime-sama">Anime-Sama (anime-sama.to)</option>
        <option value="vostfree">Vostfree (vostfree.ws)</option>
        <option value="jetanimes">JetAnimes (jetanimes.com)</option>
      </select>
    </div>
  </div>

  <div class="footer">
    <p>La page se rechargera automatiquement</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
